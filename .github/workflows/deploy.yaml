name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: firebase-cloud-491613
  REGION: europe-west2
  SERVICE_ID: shehryar-api
  SITE_ID: shehryar
  REPO: firebase-cloud

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${SERVICE_ID}:${GITHUB_SHA}"
          docker build --target prod -t "$IMAGE" -t "${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${SERVICE_ID}:latest" .
          docker push "$IMAGE"
          docker push "${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${SERVICE_ID}:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      # Fetch DB credentials from GCP Secret Manager into step outputs
      # (step-scoped, masked when consumed via ${{ steps.* }}). The CI/CD
      # SA was granted secretAccessor on these four secrets in the
      # firebase-cloud terraform repo.
      - name: Fetch DB credentials from Secret Manager
        id: db
        run: |
          {
            echo "DB_HOST=$(gcloud secrets versions access latest --secret=db-host          --project=$PROJECT_ID)"
            echo "DB_USER=$(gcloud secrets versions access latest --secret=shehryar-db-user --project=$PROJECT_ID)"
            echo "DB_PASS=$(gcloud secrets versions access latest --secret=shehryar-db-pass --project=$PROJECT_ID)"
            echo "DB_NAME=$(gcloud secrets versions access latest --secret=shehryar-db-name --project=$PROJECT_ID)"
          } >> "$GITHUB_OUTPUT"

      # Run migrations against OCI MySQL using the just-pushed image —
      # same bytes that will serve traffic. Runs before the Cloud Run
      # deploy so a failed migration aborts the rollout cleanly.
      - name: Run database migrations
        env:
          DB_HOST: ${{ steps.db.outputs.DB_HOST }}
          DB_USER: ${{ steps.db.outputs.DB_USER }}
          DB_PASS: ${{ steps.db.outputs.DB_PASS }}
          DB_NAME: ${{ steps.db.outputs.DB_NAME }}
        run: |
          docker run --rm \
            -e DB_HOST -e DB_USER -e DB_PASS -e DB_NAME \
            --entrypoint php \
            "$IMAGE" /var/www/bin/migrate.php

      - name: Deploy Cloud Run revision
        run: |
          gcloud run deploy "${SERVICE_ID}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE}" \
            --quiet

      - name: Wire Firebase Hosting rewrite
        run: |
          mkdir -p dist
          npm install -g firebase-tools
          firebase deploy \
            --only hosting:${SITE_ID} \
            --project=${PROJECT_ID} \
            --non-interactive
