daemon off;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    gzip          on;
    gzip_types    text/plain text/css application/javascript application/json image/svg+xml;

    log_format main '$remote_addr - $request_time $status "$request" "$http_user_agent"';
    access_log /dev/stdout main;

    server {
        # Cloud Run sets $PORT; default to 8080 for local runs.
        listen 8080 default_server;
        server_name _;
        root /var/www/src;
        index index.html index.php;

        # Long-cache versioned static assets (images, fonts, css, js).
        location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|ttf|otf)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # HTML pages: CDN-cacheable but re-validated per request.
        location ~* \.html$ {
            add_header Cache-Control "public, max-age=300, s-maxage=86400, stale-while-revalidate=604800";
            try_files $uri =404;
        }

        # Block direct access to chatapp internals (bootstrap, Config, etc).
        location ~ ^/chatapp/inc/ {
            deny all;
        }

        # PHP under /chatapp/ hits PHP-FPM. No PHP execution elsewhere.
        location ~ ^/chatapp/.+\.php$ {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $document_root;
            fastcgi_read_timeout 60;
            add_header Cache-Control "no-store" always;
        }

        # Root / → index.html with HTML caching rules.
        location = / {
            add_header Cache-Control "public, max-age=300, s-maxage=86400, stale-while-revalidate=604800";
            try_files /index.html =404;
        }

        # Everything else: plain static lookup.
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
